<!DOCTYPE html>
<html>
<head>
    <title>Rubik Solver</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div class="palette">

    <button class="color red"></button>
    <button class="color blue"></button>
    <button class="color yellow"></button>
    <button class="color green"></button>
    <button class="color white"></button>
    <button class="color orange"></button>

</div>

<div id="cube-container"></div>

<div class="controls">

    <button id="reset">
        Reset
    </button>

    <button id="left">
        ⬅
    </button>

    <button id="right">
        ➡
    </button>

    <button id="solve">
        Solve
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
